<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPMT – Load</title>
  <link rel="icon" href="./img/logo_WH.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="manifest" href="./manifest.json">
  <!-- SheetJS -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<header class="app-header" id="app-header"></header>

<main class="app-main">
  <div class="page-header">
    <h1 data-i18n="home_title">Charger le fichier de compétition</h1>
  </div>

  <div class="upload-card" id="dropZone">
    <div class="upload-icon">📁</div>
    <p class="upload-label" data-i18n="home_drag">Glisser-déposer le fichier ici</p>
    <p class="upload-or" data-i18n="home_or">ou</p>
    <label class="btn btn-outline">
      <span data-i18n="home_browse">Parcourir</span>
      <input type="file" id="fileInput" accept=".xlsx,.xlsm" style="display:none">
    </label>
    <p id="uploadStatus" style="margin-top:.75rem; font-size:.85rem; display:none;"></p>
  </div>

  <div class="upload-actions">
    <button class="btn btn-outline btn-sm" onclick="createManually()">
      ✏️ <span data-i18n="home_create_manual">Créer les équipes manuellement</span>
    </button>
    <a href="./CPMT_template.xlsx" download class="btn btn-ghost btn-sm">
      📥 <span data-i18n="home_download_template">Télécharger le template Excel</span>
    </a>
  </div>
</main>

<footer style="text-align:center; padding:.5rem 1rem; font-size:.67rem; color:var(--text-muted); border-top:1px solid var(--border-light);">
  © 2026 <span data-i18n="footer_author"></span> &nbsp;·&nbsp; v1.0
  &nbsp;·&nbsp; <span data-i18n="footer_internal"></span> — <span data-i18n="footer_rights"></span>
</footer>

<script type="module">
import { loadTranslations, t } from './js/i18n.js';
import { renderNav }           from './js/nav.js';
import { setState, clearAll }  from './js/state.js';
import { parseExcel }          from './js/excel.js';

// Load defaults from embedded JSON (same as config/defaults.json)
const DEFAULTS = {
  valid_classes:  [0.5,1.0,1.5,2.0,2.5,3.0,3.5,4.0,4.5,5.0],
  valid_statuses: ['','A','B','C','N'],
  players_on_court: { '4x4':4, '6x6':6 },
  match_types: ['4x4','6x6']
};

await loadTranslations();
renderNav(1);

// ── File upload ───────────────────────────────────────────────────────────────
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const status    = document.getElementById('uploadStatus');

function showStatus(msg, type = 'info') {
  status.style.display = 'block';
  status.style.color = type === 'error' ? 'var(--danger)' : type === 'success' ? 'var(--success)' : 'var(--text-muted)';
  status.textContent = msg;
}

async function handleFile(file) {
  if (!file) return;
  if (!file.name.match(/\.(xlsx|xlsm)$/i)) {
    showStatus(t('upload_err_format'), 'error'); return;
  }
  showStatus(t('home_loading'), 'info');
  const buf = await file.arrayBuffer();
  const result = parseExcel(buf, DEFAULTS);

  if (result.error) {
    const msg = t(result.error, { sheet: result.sheet || '', cols: result.cols || '' });
    showStatus(msg, 'error'); return;
  }

  // Clear previous config if new file loaded
  clearAll();
  setState('teams', result.teams);
  setState('competition_name', result.competition_name || '');

  const playerCount = result.teams.reduce((s, t) => s + t.players.length, 0);
  showStatus(
    `✓ ${t('home_success')} — ${result.teams.length} ${t('home_teams_found')}, ${playerCount} ${t('home_players_found')}`,
    'success'
  );
  setTimeout(() => { location.href = './summary.html'; }, 1000);
}

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});

// ── Manual team creation ──────────────────────────────────────────────────────
function createManually() {
  clearAll();
  setState('teams', []);
  location.href = './summary.html';
}
window.createManually = createManually;

// ── Register service worker ───────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
