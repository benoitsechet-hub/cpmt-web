<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPMT – Load</title>
  <link rel="icon" href="./img/logo_WH.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="manifest" href="./manifest.json">
  <!-- SheetJS -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<header class="app-header" id="app-header"></header>

<main class="app-main">
  <div class="page-header">
    <h1 data-i18n="home_title">Charger le fichier de compétition</h1>
  </div>

  <div class="card" style="max-width:600px; margin:0 auto;">
    <div class="card-body">

      <div class="upload-zone" id="dropZone">
        <div class="upload-icon">📂</div>
        <h3 data-i18n="home_drag"></h3>
        <p data-i18n="home_or"></p>
        <label class="btn btn-outline btn-sm mt-1" style="cursor:pointer;">
          <span data-i18n="home_browse"></span>
          <input type="file" id="fileInput" accept=".xlsx,.xlsm" style="display:none">
        </label>
      </div>

      <div class="divider" style="margin:1.25rem 0;"></div>

      <div class="index-action-btns" style="display:flex; gap:.5rem; align-items:center; justify-content:center;">
        <button class="btn btn-outline btn-sm" onclick="createManually()">
          ✏️ <span data-i18n="home_create_manual"></span>
        </button>
        <a href="./CPMT_template.xlsx" download class="btn btn-ghost btn-sm">
          ⬇️ <span data-i18n="home_download_template"></span>
        </a>
      </div>

      <div id="uploadResult" class="upload-result" style="display:none;">
        <div id="uploadAlert" class="alert" style="padding:.4rem .85rem; font-size:.84rem;"></div>
        <div id="uploadStats" style="display:none;">
          <div class="d-flex gap-2 mt-2" style="justify-content:center;">
            <div style="text-align:center; padding:.45rem 1.1rem; background:var(--blue-light); border-radius:var(--radius-sm);">
              <div style="font-size:1.15rem; font-weight:800; color:var(--blue);" id="statTeams">0</div>
              <div class="text-muted" style="font-size:.78rem;" data-i18n="home_teams_found"></div>
            </div>
            <div style="text-align:center; padding:.45rem 1.1rem; background:var(--blue-light); border-radius:var(--radius-sm);">
              <div style="font-size:1.15rem; font-weight:800; color:var(--blue);" id="statPlayers">0</div>
              <div class="text-muted" style="font-size:.78rem;" data-i18n="home_players_found"></div>
            </div>
          </div>
          <div class="mt-2 text-center">
            <a href="./summary.html" class="btn btn-primary" data-i18n="home_btn_continue"></a>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<footer style="text-align:center; padding:.5rem 1rem; font-size:.67rem; color:var(--text-muted); border-top:1px solid var(--border-light);">
  © 2026 <span data-i18n="footer_author"></span> &nbsp;·&nbsp; <span id="app-version">v1.0</span>
  &nbsp;·&nbsp; <span data-i18n="footer_internal"></span> — <span data-i18n="footer_rights"></span>
</footer>

<script type="module">
import { loadTranslations, t } from './js/i18n.js';
import { renderNav }           from './js/nav.js';
import { getState, setState, clearAll } from './js/state.js';
import { parseExcel }          from './js/excel.js';

// Load defaults from single source of truth
let DEFAULTS;
try {
  DEFAULTS = await fetch('./defaults.json').then(r => r.json());
} catch {
  // Fallback to minimal defaults if fetch fails (e.g. first load offline)
  DEFAULTS = { valid_classes:[1.0,1.5,2.0,2.5,3.0,3.5,4.0,4.5,5.0], valid_statuses:['C','R-NAO','R-FRD','VIDEO','VAL','NE',''] };
}

await loadTranslations();
renderNav(1);

// ── File upload ───────────────────────────────────────────────────────────────
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

function showAlert(type, msg) {
  const result = document.getElementById('uploadResult');
  const alert  = document.getElementById('uploadAlert');
  result.style.display = 'block';
  alert.className = `alert alert-${type}`;
  alert.textContent = msg;
}

async function handleFile(file) {
  if (!file) return;
  if (!file.name.match(/\.(xlsx|xlsm)$/i)) {
    showAlert('danger', t('upload_err_format')); return;
  }
  showAlert('info', t('home_loading'));
  document.getElementById('uploadStats').style.display = 'none';

  const buf    = await file.arrayBuffer();
  const result = parseExcel(buf, DEFAULTS);

  if (result.error) {
    showAlert('danger', t(result.error, { sheet: result.sheet || '', cols: result.cols || '' }));
    return;
  }

  // Warn if a previous config existed
  const hadConfig = !!(getState('teams')?.length || getState('match_setup'));
  clearAll();
  setState('teams', result.teams);
  setState('competition_name', result.competition_name || '');

  const playerCount = result.teams.reduce((s, tm) => s + tm.players.length, 0);
  showAlert('success', '✓ ' + t('home_success'));
  if (hadConfig) {
    const warn = document.createElement('div');
    warn.className = 'alert alert-warning mt-2';
    warn.textContent = t('home_config_cleared');
    document.getElementById('uploadResult').appendChild(warn);
  }
  document.getElementById('statTeams').textContent   = result.teams.length;
  document.getElementById('statPlayers').textContent = playerCount;
  document.getElementById('uploadStats').style.display = 'block';
}

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});

// ── Manual team creation ──────────────────────────────────────────────────────
function createManually() {
  clearAll();
  setState('teams', []);
  location.href = './summary.html';
}
window.createManually = createManually;

// ── App version in footer ─────────────────────────────────────────────────────
fetch('./version.json').then(r => r.json()).then(v => {
  const el = document.getElementById('app-version');
  if (el && v.version) el.textContent = v.version;
}).catch(() => {});

// ── Register service worker ───────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
